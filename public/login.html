<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — Herbalife Stock Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:420px;padding:20px;}
.card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 24px 60px rgba(0,0,0,.35);}
.brand{text-align:center;margin-bottom:32px;}
.brand-icon{width:60px;height:60px;background:linear-gradient(135deg,#e8480c,#ff6b35);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;}
.brand h1{font-size:22px;font-weight:800;color:#1e293b;}
.brand p{font-size:13px;color:#64748b;margin-top:3px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.input-wrap{position:relative;}
.input-wrap input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px 11px 40px;font-size:14px;color:#1e293b;transition:.2s;background:#f8fafc;}
.input-wrap input:focus{outline:none;border-color:#e8480c;background:#fff;box-shadow:0 0 0 3px #fff0eb;}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;width:18px;height:18px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:2px;}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#e8480c,#ff6b35);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:6px;letter-spacing:.02em;}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,72,12,.4);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-box{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.divider{text-align:center;margin:20px 0;color:#94a3b8;font-size:12px;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:#e2e8f0;}
.divider::before{left:0;} .divider::after{right:0;}
.demo-accounts{background:#f8fafc;border-radius:10px;padding:14px;}
.demo-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.demo-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#fff;border-radius:8px;margin-bottom:6px;border:1px solid #e2e8f0;cursor:pointer;transition:.15s;}
.demo-row:hover{border-color:#e8480c;background:#fff0eb;}
.demo-row:last-child{margin-bottom:0;}
.demo-info .role{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.role-admin{background:#fef3c7;color:#b45309;}
.role-staff{background:#dbeafe;color:#1d4ed8;}
.demo-info .creds{font-size:12px;color:#64748b;margin-top:2px;}
.demo-use{font-size:11px;color:#e8480c;font-weight:600;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🌿</div>
      <h1>Herbalife Stock</h1>
      <p>Sign in to manage your inventory</p>
    </div>
    <div class="error-box" id="err"></div>
    <div class="fg">
      <label>Email Address</label>
      <div class="input-wrap">
        <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
    </div>
    <div class="fg">
      <label>Password</label>
      <div class="input-wrap">
        <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="eye-btn" onclick="togglePwd()" type="button">
          <svg id="eye-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
      </div>
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="divider">Demo Accounts</div>
    <div class="demo-accounts">
      <div class="demo-title">Click to fill credentials</div>
      <div class="demo-row" onclick="fill('admin@herbalife.com','admin123')">
        <div class="demo-info">
          <span class="role role-admin">Admin</span>
          <div class="creds">admin@herbalife.com / admin123</div>
        </div>
        <span class="demo-use">Use →</span>
      </div>
      <div class="demo-row" onclick="fill('staff@herbalife.com','staff123')">
        <div class="demo-info">
          <span class="role role-staff">Staff</span>
          <div class="creds">staff@herbalife.com / staff123</div>
        </div>
        <span class="demo-use">Use →</span>
      </div>
    </div>
  </div>
</div>
<script>
function fill(e,p){ document.getElementById('email').value=e; document.getElementById('password').value=p; }
function togglePwd(){
  const i=document.getElementById('password');
  i.type = i.type==='password'?'text':'password';
}
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('login-btn');
  err.style.display='none';
  if(!email||!password){ err.textContent='Please enter email and password.'; err.style.display='block'; return; }
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Signing in…';
  try {
    const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data = await res.json();
    if(!res.ok){ err.textContent=data.error||'Login failed'; err.style.display='block'; return; }
    localStorage.setItem('hl_token', data.token);
    localStorage.setItem('hl_user', JSON.stringify(data.user));
    window.location.href='/';
  } catch(e){ err.textContent='Server error. Please try again.'; err.style.display='block'; }
  finally{ btn.disabled=false; btn.innerHTML='Sign In'; }
}
// Redirect if already logged in
if(localStorage.getItem('hl_token')) window.location.href='/';
</script>
</body>
</html>
